<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 牌背: 平坦な単色に見えてチープだったので層構造に [2026-07-20]。
     赤ベース維持必須: App.svelte が hue-rotate(220deg)=青背 / hue-rotate(60deg)=橙背 で
     局の偶奇色分けをしている。色相をずらす変更はソコを壊す -->
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400" version="1.1">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e83030" />
      <stop offset="0.5" stop-color="#d42222" />
      <stop offset="1" stop-color="#a81818" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4848" />
      <stop offset="1" stop-color="#c41f1f" />
    </linearGradient>
    <linearGradient id="glossGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <pattern id="weave" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="14" height="14" fill="none" />
      <rect width="7" height="14" fill="#ffffff" fill-opacity="0.045" />
    </pattern>
  </defs>
  <rect x="0" y="0" width="300" height="400" rx="40" fill="url(#bodyGrad)" />
  <rect x="0" y="0" width="300" height="400" rx="40" fill="none" stroke="#7c0e0e" stroke-width="6" stroke-opacity="0.55" />
  <rect x="26" y="26" width="248" height="348" rx="26" fill="url(#innerGrad)" />
  <rect x="26" y="26" width="248" height="348" rx="26" fill="url(#weave)" />
  <rect x="26" y="26" width="248" height="348" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="4" />
  <rect x="26" y="26" width="248" height="348" rx="26" fill="none" stroke="#700c0c" stroke-opacity="0.4" stroke-width="10" transform="translate(4,6)" />
  <circle cx="150" cy="200" r="58" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="7" />
  <circle cx="150" cy="200" r="30" fill="#ffffff" fill-opacity="0.08" />
  <path d="M 20 60 Q 24 26 60 22 L 240 20 Q 150 34 96 52 Q 40 72 20 130 Z" fill="url(#glossGrad)" />
</svg>
